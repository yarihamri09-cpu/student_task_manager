{% extends'layout.html' %}

{% block content %}

<h2>Students</h2>

<table 
    id="students_table"
    class="table table-ordered table-striped table-hover"
>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}

        <tr>
            <td>{{ student.student_id }}</td>
            <td>
                {{ student.first_name }}
                {{ student.last_name }}
            </td>
            <td>{{ student.course_name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}

{% block scripts %}

<script>

    $(document).ready(function () {

        $('#students_table').DataTable();

    });

</script>

{% endblock %}
